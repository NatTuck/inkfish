# separate terms of service, privacy policy, and support
# documentation.

name: Elixir CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

env:
  SHELL: /usr/bin/bash

jobs:
  build:

    name: Build and test
    runs-on: ubuntu-latest

    services:
      # Label used to access the service container
      postgres:
        # Docker Hub image
        image: postgres
        # Provide the password for postgres
        env:
          POSTGRES_USER: inkfish
          POSTGRES_PASSWORD: oobeiGait3ie
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          # Maps tcp port 5432 on service container to the host
          - 5432:5432

    steps:
    - uses: actions/checkout@v4
    - uses: actions-rust-lang/setup-rust-toolchain@v1
    - uses: pnpm/action-setup@v4
      with:
        package_json_file: assets/package.json
    - uses: actions/setup-node@v4
      with:
        node-version: '22'
    - name: Set up Elixir
      uses: erlef/setup-beam@v1
      with:
        elixir-version: '1.18.0' # [Required] Define the Elixir version
        otp-version: '27.0'      # [Required] Define the Erlang/OTP version
    - name: Restore dependencies cache
      uses: actions/cache@v3
      with:
        path: deps
        key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
        restore-keys: ${{ runner.os }}-mix-
    - name: Install dependencies
      run: mix deps.get
    - name: Cache npm dependencies
      uses: actions/cache@v3
      with:
        path: assets/node_modules
        key: ${{ runner.os }}-npm-${{ hashFiles('assets/pnpm-lock.yaml') }}
    - name: Install npm dependencies
      run: pnpm install --dir assets
    - name: Run JS tests
      run: pnpm --dir assets test
    - name: Install Playwright browsers
      run: pnpm --dir assets exec playwright install chromium
    - name: Install tmptmpfs
      run: (cd support/tmptmpfs && cargo build && sudo ./install.sh)
    - name: Setup
      run: MIX_ENV=test mix ecto.setup
    - name: Run tests
      run: mix test
